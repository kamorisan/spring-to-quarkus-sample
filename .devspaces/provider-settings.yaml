# MTA Provider Settings
# This file is automatically detected by the MTA extension
---
environment:
  ALWAYS_APPLIED_KEY: "envvar to be set regardless of which model is active"

models:
  OpenAI: &active
    environment:
      OPENAI_API_KEY: "sk-k6yUFWReBsfsLzDmPWFn9w"
    provider: ChatOpenAI
    args:
      model: gpt-oss-120b
      configuration:
        baseURL: https://maas-rhdp.apps.maas.redhatworkshops.io/v1

  AzureChatOpenAI:
    environment:
      AZURE_OPENAI_API_KEY: ""
    provider: AzureChatOpenAI
    args:
      azureOpenAIApiDeploymentName: ""
      azureOpenAIApiVersion: ""

  AmazonBedrock:
    environment:
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_DEFAULT_REGION: ""
    provider: ChatBedrock
    args:
      model: meta.llama3-70b-instruct-v1:0

  DeepSeek:
    environment:
      DEEPSEEK_API_KEY: ""
    provider: ChatDeepSeek
    args:
      model: deepseek-chat

  GoogleGenAI:
    environment:
      GOOGLE_API_KEY: ""
    provider: ChatGoogleGenerativeAI
    args:
      model: gemini-2.5-pro

  ChatOllama:
    provider: ChatOllama
    args:
      model: your-model-here

active: *active
